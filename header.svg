<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="50%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a4a" stroke-width="0.5"/>
    </pattern>
    <filter id="tglow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="900" height="160" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="900" height="160" fill="url(#bg)"/>
    <rect width="900" height="160" fill="url(#grid)" opacity="0.45"/>
    <ellipse cx="450" cy="165" rx="520" ry="65" fill="#185FA5" opacity="0.07"/>
    <ellipse cx="200" cy="0" rx="200" ry="80" fill="#1D9E75" opacity="0.05"/>
    <!-- AWS -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;12,0;0,0" dur="18s" repeatCount="indefinite"/>
      <g transform="translate(52,32)" opacity="0.9">
        <rect x="0" y="0" width="52" height="34" rx="5" fill="#FF9900" fill-opacity="0.12" stroke="#FF9900" stroke-width="0.5" stroke-opacity="0.4"/>
        <text x="26" y="11" font-family="monospace" font-size="6.5" fill="#FF9900" text-anchor="middle" font-weight="bold" letter-spacing="1">amazon</text>
        <text x="26" y="21" font-family="monospace" font-size="10" fill="#FF9900" text-anchor="middle" font-weight="bold">aws</text>
        <path d="M 6 30 Q 26 37 46 30" stroke="#FF9900" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <polygon points="46,27 47,30 44,30" fill="#FF9900"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="18s" repeatCount="indefinite"/>
      </g>
    </g>
    <!-- Azure -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="14s" repeatCount="indefinite"/>
      <g transform="translate(200,28)" opacity="0.9">
        <rect x="0" y="0" width="52" height="40" rx="5" fill="#0078D4" fill-opacity="0.12" stroke="#0078D4" stroke-width="0.5" stroke-opacity="0.4"/>
        <polygon points="12,36 26,6 40,36 33,36 26,20 19,36" fill="none" stroke="#0078D4" stroke-width="1.8" stroke-linejoin="round"/>
        <line x1="17" y1="28" x2="35" y2="28" stroke="#0078D4" stroke-width="1.5"/>
        <text x="26" y="46" font-family="monospace" font-size="7" fill="#0078D4" text-anchor="middle" font-weight="bold">Azure</text>
        <animate attributeName="opacity" values="0.65;1;0.65" dur="14s" repeatCount="indefinite"/>
      </g>
    </g>
    <!-- GCP -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;-10,0;0,0" dur="20s" repeatCount="indefinite"/>
      <g transform="translate(358,32)" opacity="0.85">
        <rect x="0" y="0" width="52" height="34" rx="5" fill="#4285F4" fill-opacity="0.12" stroke="#4285F4" stroke-width="0.5" stroke-opacity="0.4"/>
        <path d="M 38 13 L 26 13 L 26 19 L 34 19 Q 32 28 20 25 Q 12 20 15 10 Q 19 2 28 3 Q 36 4 40 10 Z" fill="none" stroke="#4285F4" stroke-width="1.6"/>
        <rect x="26" y="16" width="13" height="5" fill="#4285F4" fill-opacity="0.35"/>
        <text x="26" y="40" font-family="monospace" font-size="7" fill="#4285F4" text-anchor="middle" font-weight="bold">GCP</text>
        <animate attributeName="opacity" values="0.6;0.95;0.6" dur="20s" repeatCount="indefinite"/>
      </g>
    </g>
    <!-- Kubernetes -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,10;0,0" dur="16s" repeatCount="indefinite"/>
      <g transform="translate(518,30)" opacity="0.85">
        <rect x="0" y="0" width="52" height="38" rx="5" fill="#326CE5" fill-opacity="0.12" stroke="#326CE5" stroke-width="0.5" stroke-opacity="0.4"/>
        <circle cx="26" cy="17" r="13" fill="none" stroke="#326CE5" stroke-width="1.5"/>
        <circle cx="26" cy="17" r="5" fill="none" stroke="#326CE5" stroke-width="1.5"/>
        <line x1="26" y1="4" x2="26" y2="10" stroke="#326CE5" stroke-width="1.5"/>
        <line x1="26" y1="24" x2="26" y2="30" stroke="#326CE5" stroke-width="1.5"/>
        <line x1="13" y1="17" x2="19" y2="17" stroke="#326CE5" stroke-width="1.5"/>
        <line x1="33" y1="17" x2="39" y2="17" stroke="#326CE5" stroke-width="1.5"/>
        <line x1="16" y1="8" x2="19.5" y2="11.5" stroke="#326CE5" stroke-width="1.5"/>
        <line x1="32.5" y1="22.5" x2="36" y2="26" stroke="#326CE5" stroke-width="1.5"/>
        <line x1="36" y1="8" x2="32.5" y2="11.5" stroke="#326CE5" stroke-width="1.5"/>
        <line x1="19.5" y1="22.5" x2="16" y2="26" stroke="#326CE5" stroke-width="1.5"/>
        <text x="26" y="46" font-family="monospace" font-size="7" fill="#326CE5" text-anchor="middle" font-weight="bold">k8s</text>
        <animate attributeName="opacity" values="0.55;0.9;0.55" dur="16s" repeatCount="indefinite"/>
      </g>
    </g>
    <!-- Docker -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;8,0;0,0" dur="22s" repeatCount="indefinite"/>
      <g transform="translate(682,32)" opacity="0.8">
        <rect x="0" y="0" width="52" height="34" rx="5" fill="#2496ED" fill-opacity="0.12" stroke="#2496ED" stroke-width="0.5" stroke-opacity="0.4"/>
        <rect x="10" y="18" width="32" height="4" rx="1" fill="#2496ED"/>
        <rect x="12" y="13" width="6" height="5" rx="1" fill="#2496ED"/>
        <rect x="20" y="13" width="6" height="5" rx="1" fill="#2496ED"/>
        <rect x="28" y="13" width="6" height="5" rx="1" fill="#2496ED"/>
        <rect x="20" y="8" width="6" height="5" rx="1" fill="#2496ED"/>
        <rect x="28" y="8" width="6" height="5" rx="1" fill="#2496ED"/>
        <path d="M 42 18 Q 50 11 45 6" stroke="#2496ED" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="46" cy="5" r="2" fill="#2496ED" fill-opacity="0.5"/>
        <text x="26" y="41" font-family="monospace" font-size="7" fill="#2496ED" text-anchor="middle" font-weight="bold">Docker</text>
        <animate attributeName="opacity" values="0.5;0.82;0.5" dur="22s" repeatCount="indefinite"/>
      </g>
    </g>
    <!-- Terraform -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="25s" repeatCount="indefinite"/>
      <g transform="translate(826,32)" opacity="0.75">
        <rect x="0" y="0" width="52" height="34" rx="5" fill="#623CE4" fill-opacity="0.12" stroke="#623CE4" stroke-width="0.5" stroke-opacity="0.4"/>
        <polygon points="10,10 20,16 20,28 10,22" fill="#623CE4" fill-opacity="0.85"/>
        <polygon points="22,6 32,12 32,20 22,14" fill="#623CE4" fill-opacity="0.65"/>
        <polygon points="22,22 32,28 32,30 22,24" fill="#623CE4" fill-opacity="0.5"/>
        <text x="26" y="41" font-family="monospace" font-size="7" fill="#623CE4" text-anchor="middle" font-weight="bold">Terraform</text>
        <animate attributeName="opacity" values="0.45;0.78;0.45" dur="25s" repeatCount="indefinite"/>
      </g>
    </g>
    <!-- Scan sweep -->
    <rect x="0" y="0" width="60" height="160" fill="white" opacity="0.015">
      <animateTransform attributeName="transform" type="translate" values="-100,0;1000,0" dur="9s" repeatCount="indefinite"/>
    </rect>
    <!-- Glow behind title -->
    <ellipse cx="450" cy="95" rx="180" ry="30" fill="#185FA5" opacity="0.08"/>
    <!-- Title -->
    <text x="450" y="93" font-family="'Segoe UI',system-ui,sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle" filter="url(#tglow)" opacity="0.18">Mohammed Azim</text>
    <text x="450" y="93" font-family="'Segoe UI',system-ui,sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">Mohammed Azim</text>
    <!-- Subtitle -->
    <text x="450" y="118" font-family="monospace" font-size="11" fill="#1D9E75" text-anchor="middle" letter-spacing="3.5" opacity="0.88">DevSecOps · Cloud · AI/MLOps</text>
    <!-- Accent line -->
    <line x1="200" y1="130" x2="700" y2="130" stroke="#1D9E75" stroke-width="0.4" opacity="0.3"/>
    <!-- Particles -->
    <circle cx="155" cy="15" r="1.5" fill="#1D9E75" opacity="0.4"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="145" r="1.2" fill="#185FA5" opacity="0.4"><animate attributeName="opacity" values="0.15;0.6;0.15" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="12" r="1.5" fill="#FF9900" opacity="0.35"><animate attributeName="opacity" values="0.15;0.55;0.15" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="630" cy="148" r="1.2" fill="#326CE5" opacity="0.35"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="18" r="1.5" fill="#623CE4" opacity="0.35"><animate attributeName="opacity" values="0.15;0.6;0.15" dur="5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
